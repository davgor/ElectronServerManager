name: Release

on:
  push:
    branches:
      - main
  merge_group:
  workflow_dispatch:

jobs:
  release:
    # Skip Actions bot pushes (version bumps) and Kickback reverts so we do not
    # publish from auto-generated commits. CI must be green before packaging.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'merge_group' ||
      (github.event_name == 'push' &&
       github.actor != 'github-actions[bot]' &&
       !startsWith(github.event.head_commit.message, 'Kickback:'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: read
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Wait for required CI checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: node .github/scripts/wait-for-required-checks.cjs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine wine32 wine64

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build Electron main
        run: npm run electron-build

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(grep '"version"' package.json | head -1 | awk -F'"' '{print $4}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Increment version and update package.json
        id: newversion
        run: |
          CURRENT_VERSION=$(grep '"version"' package.json | head -1 | awk -F'"' '{print $4}')
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          sed -i "s/\"version\": \"$CURRENT_VERSION\"/\"version\": \"$NEW_VERSION\"/" package.json

      - name: Create git tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          TAG="v${{ steps.newversion.outputs.NEW_VERSION }}"
          git add package.json
          git commit -m "Bump version to ${{ steps.newversion.outputs.NEW_VERSION }}"
          if ! git rev-parse $TAG >/dev/null 2>&1; then
            git tag $TAG
            git push origin HEAD:main
            git push origin $TAG
          fi

      # electron-updater auto-update support:
      # - Windows NSIS + Linux AppImage publish latest.yml / latest-linux.yml + blockmaps
      # - Portable (.exe portable) and .deb are uploaded for manual install only
      - name: Build and package with electron-builder (Windows)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish never

      - name: Build and package with electron-builder (Linux)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux --publish never

      # softprops uploads the on-disk filename; GitHub turns spaces into dots, while
      # electron-updater's latest.yml uses hyphenated names. Keep artifacts space-free.
      - name: Sanitize release artifact filenames
        run: |
          set -euo pipefail
          cd release
          shopt -s nullglob
          for f in *\ *; do
            mv -v -- "$f" "${f// /-}"
          done

      - name: Verify updater metadata matches packaged files
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          release = pathlib.Path("release")
          for meta_name in ("latest.yml", "latest-linux.yml"):
              meta = release / meta_name
              if not meta.exists():
                  print(f"missing {meta_name}", file=sys.stderr)
                  sys.exit(1)
              text = meta.read_text(encoding="utf-8")
              urls = re.findall(r"(?m)^\s+url:\s+(\S+)$", text)
              path_match = re.search(r"(?m)^path:\s+(\S+)$", text)
              if path_match is not None:
                  urls.append(path_match.group(1))
              for url in urls:
                  if " " in url or ".." in url:
                      print(f"{meta_name} has unsafe url: {url}", file=sys.stderr)
                      sys.exit(1)
                  candidate = release / url
                  if not candidate.is_file():
                      print(
                          f"{meta_name} references {url} but file is missing",
                          file=sys.stderr,
                      )
                      print(
                          "release files:",
                          sorted(p.name for p in release.iterdir()),
                          file=sys.stderr,
                      )
                      sys.exit(1)
              print(f"{meta_name}: ok ({len(urls)} paths)")
          PY

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.newversion.outputs.NEW_VERSION }}
          generate_release_notes: true
          files: |
            release/*.AppImage
            release/*.deb
            release/*.exe
            release/*.msi
            release/latest.yml
            release/latest-linux.yml
            release/*.blockmap
